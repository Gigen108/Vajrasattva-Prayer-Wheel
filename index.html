<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vajrasattva Prayer Wheel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #000;
      color: #f0ece4;
      font-family: 'EB Garamond', Georgia, serif;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .title {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f0ece4;
      text-align: center;
      padding: 1.5rem 2rem 0.5rem;
      flex-shrink: 0;
    }

    .dedication {
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
      font-style: italic;
      color: #777;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 0 2rem 1.2rem;
      flex-shrink: 0;
    }

    .reel-border {
      width: 100%;
      height: 1px;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    /* Masks overflow, fills remaining vertical space */
    .reel-wrapper {
      width: 100vw;
      flex: 1;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }

    /* Two copies side by side — second copy picked up seamlessly when first exits */
    .reel-track {
      display: flex;
      width: max-content;
      height: 100%;
      animation: scroll-reel 22s linear infinite;
      will-change: transform;
    }

    @keyframes scroll-reel {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .reel-track img {
      height: 100%;
      width: auto;
      display: block;
      flex-shrink: 0;
      filter: grayscale(1) contrast(1.08);
    }

    /* Soft fade at left and right edges — film emerging from darkness */
    .reel-wrapper::before,
    .reel-wrapper::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100px;
      z-index: 2;
      pointer-events: none;
    }

    .reel-wrapper::before {
      left: 0;
      background: linear-gradient(to right, #000 0%, transparent 100%);
    }

    .reel-wrapper::after {
      right: 0;
      background: linear-gradient(to left, #000 0%, transparent 100%);
    }

    .mantra-note {
      font-size: clamp(0.6rem, 1vw, 0.72rem);
      color: #383838;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0.7rem 2rem 1.2rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="title">Vajrasattva Prayer Wheel</div>
  <div class="dedication">Dedicated to Samantabhadra Buddha and the Complete Liberation of All Beings</div>

  <div class="reel-border"></div>

  <div class="reel-wrapper">
    <div class="reel-track">
      <img src="vajra-wheel.jpg" alt="Vajrasattva 100 Syllable Mantra — 100,000,000 recitations">
      <img src="vajra-wheel.jpg" alt="" aria-hidden="true">
    </div>
  </div>

  <div class="reel-border"></div>

  <div class="mantra-note">oṃ vajrasattva samaya manupālaya · 100,000,000 recitations</div>

</body>
</html>
