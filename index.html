<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vajrasattva Prayer Wheel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      color: #f0ece4;
      font-family: 'EB Garamond', Georgia, serif;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    .title {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f0ece4;
      text-align: center;
      padding: 1.4rem 2rem 0.4rem;
      flex-shrink: 0;
    }

    .dedication {
      font-size: clamp(0.72rem, 1.4vw, 0.92rem);
      font-style: italic;
      color: #777;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 0 2rem 1rem;
      flex-shrink: 0;
    }

    .reel-border {
      width: 100%;
      height: 1px;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    canvas {
      display: block;
      flex: 1;
      width: 100%;
    }

    .mantra-note {
      font-size: clamp(0.58rem, 1vw, 0.7rem);
      color: #333;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0.6rem 2rem 1rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="title">Vajrasattva Prayer Wheel</div>
  <div class="dedication">Dedicated to Samantabhadra Buddha and the Complete Liberation of All Beings</div>
  <div class="reel-border"></div>
  <canvas id="reel" aria-label="Vajrasattva 100 Syllable Mantra — 100,000,000 recitations"></canvas>
  <div class="reel-border"></div>
  <div class="mantra-note">oṃ vajrasattva samaya manupālaya · 100,000,000 recitations</div>

  <script>
    const canvas = document.getElementById('reel');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'vajra-wheel.jpg';

    // Pixels per second — increase this number to go faster
    const SPEED = 800;

    let offset = 0;
    let lastTime = null;
    let scaledW = 0;

    function resize() {
      canvas.width = canvas.offsetWidth * devicePixelRatio;
      canvas.height = canvas.offsetHeight * devicePixelRatio;
      // Scale image so its height fills the canvas height exactly
      if (img.naturalWidth > 0) {
        scaledW = img.naturalWidth * (canvas.height / img.naturalHeight);
      }
    }

    function draw(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const delta = (timestamp - lastTime) / 1000; // seconds
      lastTime = timestamp;

      offset = (offset + SPEED * devicePixelRatio * delta) % scaledW;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw tiles from left edge to right, offset so it starts mid-image for seamlessness
      let x = -offset;
      while (x < canvas.width) {
        ctx.drawImage(img, x, 0, scaledW, canvas.height);
        x += scaledW;
      }

      requestAnimationFrame(draw);
    }

    img.onload = () => {
      resize();
      requestAnimationFrame(draw);
    };

    window.addEventListener('resize', resize);
  </script>

</body>
</html>
